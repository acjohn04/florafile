<body class="antialiased min-h-screen flex flex-col">
<!-- Top Navigation Placeholder (Hidden for transactional flow) -->
<header class="w-full bg-background dark:bg-surface-dim px-container-margin-mobile md:px-container-margin-desktop py-4 flex items-center justify-between shadow-sm border-b border-outline-variant/20">

<span class="font-label-md text-label-md">Back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary font-bold">Confirm Plant</h1>
<div class="w-8"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow w-full max-w-[1200px] mx-auto px-container-margin-mobile md:px-container-margin-desktop py-8 md:py-12 pb-32">
<div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-start">
<!-- Plant Image Hero Area -->
<div class="md:col-span-5 flex flex-col gap-6">
<div class="relative w-full aspect-[4/5] rounded-2xl overflow-hidden shadow-sm bg-surface-container-low border border-outline-variant/30">

<div class="absolute bottom-4 left-4 right-4 bg-surface-container-lowest/90 backdrop-blur-md p-4 rounded-xl shadow-sm border border-outline-variant/50">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-1 uppercase tracking-wider">Identified As</p>
<h2 class="font-headline-md text-headline-md text-primary">Monstera Deliciosa</h2>
</div>
</div>
<!-- Brief Care Summary Bento Box -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-sm border border-outline-variant/30 flex gap-4 overflow-x-auto snap-x">
<div class="flex flex-col items-center justify-center p-3 bg-secondary-container/30 rounded-lg min-w-[80px] snap-center border border-outline-variant/20">
<span class="material-symbols-outlined text-surface-tint mb-2" style="font-variation-settings: 'FILL' 1;">light_mode</span>
<span class="font-label-sm text-label-sm text-on-surface">Bright</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-[10px]">Indirect</span>
</div>
<div class="flex flex-col items-center justify-center p-3 bg-primary-fixed/30 rounded-lg min-w-[80px] snap-center border border-outline-variant/20">
<span class="material-symbols-outlined text-surface-tint mb-2" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="font-label-sm text-label-sm text-on-surface">Moderate</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-[10px]">Weekly</span>
</div>
<div class="flex flex-col items-center justify-center p-3 bg-tertiary-fixed/30 rounded-lg min-w-[80px] snap-center border border-outline-variant/20">
<span class="material-symbols-outlined text-tertiary-container mb-2" style="font-variation-settings: 'FILL' 1;">thermostat</span>
<span class="font-label-sm text-label-sm text-on-surface">Warm</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-[10px]">65-85°F</span>
</div>
</div>
</div>

<div class="flex flex-col gap-2">
<h3 class="font-headline-md text-headline-md text-on-background">Catalog Your Plant</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Give your new friend a name and assign it a home.</p>
</div>
<div class="flex flex-col gap-6">

<label class="block font-label-md text-label-md text-on-surface mb-2" for="nickname">Plant Nickname</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">edit</span>
<input class="w-full pl-12 pr-4 py-4 bg-transparent border-b-2 border-outline-variant text-on-background font-body-lg text-body-lg focus:border-primary focus:ring-0 transition-colors rounded-none placeholder-on-surface-variant/50" id="nickname" name="nickname" placeholder="e.g. Monty, Big Leaf, etc." type="text"/>
</div>
</div>
<!-- Room Selection (Chips) -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-3">Location / Room</label>
<div class="flex flex-wrap gap-3">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="room" type="radio" value="living_room"/>
<div class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-all hover:bg-surface-container-low flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">chair</span>
                                    Living Room
                                </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="room" type="radio" value="bedroom"/>
<div class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-all hover:bg-surface-container-low flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">bed</span>
                                    Bedroom
                                </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="room" type="radio" value="office"/>
<div class="px-5 py-2.5 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary-container transition-all hover:bg-surface-container-low flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">desk</span>
                                    Office
                                </div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="room" type="radio" value="add_new"/>
<div class="px-5 py-2.5 rounded-full border border-dashed border-outline bg-surface-container-lowest text-on-surface-variant font-label-md text-label-md peer-checked:bg-secondary-container peer-checked:text-on-secondary-container peer-checked:border-secondary-container transition-all hover:bg-surface-container-low flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 0;">add</span>
                                    Add New
                                </div>
</label>
</div>
</div>

<div class="flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-outline-variant/30 mt-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<div>
<p class="font-label-md text-label-md text-on-surface">Auto-Schedule Care</p>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Create reminders based on plant needs</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-surface after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-on-surface after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<div class="mt-8 pt-6 border-t border-outline-variant/30">
<button class="w-full py-4 px-6 bg-primary text-on-primary rounded-full font-label-md text-label-md hover:bg-primary-fixed-dim transition-colors flex items-center justify-center gap-2 shadow-md active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
                        Save to Inventory
                    </button>
<button class="w-full py-4 px-6 mt-3 bg-transparent text-primary rounded-full font-label-md text-label-md hover:bg-surface-container-high transition-colors flex items-center justify-center border border-transparent hover:border-outline-variant/50">
                        Cancel
                    </button>
</div>
</div>
</div>
